name: Build sector reports

# How this runs:
#   • workflow_dispatch  → the primary trigger. cron-job.org POSTs to the GitHub
#     API each weekday pre-market to fire this (same pattern as Sniper).
#   • schedule           → a backup cron in case the external scheduler misses.
on:
  workflow_dispatch:
  schedule:
    # ~08:30 ET on weekdays (12:30 UTC). Backup only — cron-job.org is primary.
    - cron: '30 12 * * 1-5'

permissions:
  contents: write   # needed so the job can commit the rebuilt site/ back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build reports (Anthropic API + live web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Notification (build.py picks Telegram if set, else Resend, else skips).
          # Secrets: Settings -> Secrets and variables -> Actions -> Secrets.
          # Variables (TELEGRAM_CHAT_ID, SITE_URL, EMAIL_FROM): the Variables tab.
          #
          # Telegram (preferred — no domain/DNS needed):
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          # Email via Resend (fallback — needs a DNS-verified sending domain):
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # Public hub URL, used by either channel to link to the reports:
          SITE_URL: ${{ vars.SITE_URL }}
        run: python build.py

      - name: Commit & push the rebuilt site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git commit -m "Auto: sector reports $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
