name: Build Sector Intelligence report

# Builds the ONE consolidated Daily AI Sector Intelligence Report
# (`python build.py --report sector-intelligence`) — the whole-market ranked
# overview + drill-downs that REPLACES the old 5 separate sector pages.
#
# How this runs:
#   • NOTE: the DAILY sector build now runs via report.yml in the 8:50am ET /
#     6:50am CR morning batch ({"reports":"sector-intelligence,mean-reversion"}).
#     This workflow is kept as a manual / backup single-report path.
#   • workflow_dispatch  → cron-job.org can POST to the GitHub API to fire this
#     (same pattern as Sniper); also used for manual runs.
#   • schedule           → a backup cron in case the external scheduler misses.
on:
  workflow_dispatch:
  # schedule:  # ⏸ TEMPORARILY DISABLED (GitHub-native backup cron only).
  #            # cron-job.org still fires this via workflow_dispatch, and manual
  #            # runs still work. Re-enable by uncommenting the two lines below.
  #   # 06:15 Costa Rica (UTC-6) = 12:15 UTC on weekdays. BACKUP ONLY — cron-job.org
  #   # fires the primary at 06:00 CR. The guard step + concurrency below make this
  #   # backup a no-op whenever the primary already ran, so it never double-bills.
  #   - cron: '15 12 * * 1-5'

# Serialize runs: if the primary and the backup both fire, the second one queues
# and then the guard step skips it — never two paid builds for the same day.
concurrency:
  group: build-sector-reports
  cancel-in-progress: false

permissions:
  contents: write   # needed so the job can commit the rebuilt site/ back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Skip if today's report already exists
        id: guard
        run: |
          TODAY=$(date -u +%F)
          if compgen -G "site/sector-intelligence/$TODAY.html" > /dev/null; then
            echo "Sector Intelligence for $TODAY already built — skipping (avoids a duplicate paid run)."
            echo "already_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.already_built == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.already_built == 'false'
        run: pip install -r requirements.txt

      - name: Build the Sector Intelligence report (Anthropic API + live web search)
        if: steps.guard.outputs.already_built == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Notification (build.py picks Telegram if set, else Resend, else skips).
          # Secrets: Settings -> Secrets and variables -> Actions -> Secrets.
          # Variables (TELEGRAM_CHAT_ID, SITE_URL, EMAIL_FROM): the Variables tab.
          #
          # Telegram (preferred — no domain/DNS needed):
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          # Email via Resend (fallback — needs a DNS-verified sending domain):
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          # Public hub URL, used by either channel to link to the reports:
          SITE_URL: ${{ vars.SITE_URL }}
        run: python build.py --report sector-intelligence

      - name: Commit & push the rebuilt site (race-safe)
        if: steps.guard.outputs.already_built == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git commit -m "Auto: sector intelligence $(date -u +%Y-%m-%d)" || { echo "Nothing to commit"; exit 0; }
          # If another report build pushes at the same time, merge it (per-slug
          # files never overlap), rebuild the shared hub from disk, and retry.
          for i in $(seq 1 10); do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            echo "push rejected — syncing & retrying ($i)…"
            git fetch origin main || { sleep $((i % 5 + 1)); continue; }
            git merge -X theirs --no-edit FETCH_HEAD || true
            python build.py --rebuild-hub || true
            git add site/index.html
            git commit --no-edit -m "Rebuild hub after concurrent merge" || true
            sleep $((i % 5 + 1))
          done
          echo "ERROR: could not push after retries"; exit 1
