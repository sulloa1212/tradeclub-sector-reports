name: Build report(s)

# Builds one or more registry reports — triggered by cron-job.org at each
# report's scheduled time (pass the slugs as the `reports` input), or manually.
# Runs `python build.py --reports <list>`, commits site/<slug>/, and Cloudflare
# publishes each at /<slug>/. Separate from the scheduled SECTOR build (build.yml).
#
# To schedule: create one cron-job.org job per run-time group, each POSTing to
#   https://api.github.com/repos/<owner>/<repo>/actions/workflows/reports.yml/dispatches
# with body {"ref":"main","inputs":{"reports":"<comma,separated,slugs>"}}.
# Set each job's TIME ZONE to America/New_York and use the ET run time so it
# tracks the US market across daylight-saving changes automatically.

on:
  workflow_dispatch:
    inputs:
      reports:
        description: "Comma-separated report slugs (e.g. 'gap-risk'  or  'sector-intelligence,mean-reversion')"
        required: true
        default: "gap-risk"

permissions:
  contents: write

concurrency:
  group: build-sector-reports
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: python build.py --reports "${{ github.event.inputs.reports }}"

      - name: Commit & push the generated report(s)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git commit -m "Reports: ${{ github.event.inputs.reports }} $(date -u +%Y-%m-%d)" || { echo "Nothing to commit"; exit 0; }
          # Rebase onto any commits that landed while we were generating (another
          # report run, the sector build, etc.) and retry, so close-together runs
          # never fail with a non-fast-forward push.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && { echo "pushed on attempt $i"; exit 0; }
            echo "push attempt $i failed — retrying..."; sleep 5
          done
          echo "ERROR: could not push after retries"; exit 1
