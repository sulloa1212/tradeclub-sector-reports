name: Test Telegram Notification

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Test message to send'
        required: false
        default: 'Test message from TradeClub Sector Reports workflow'

jobs:
  test-telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send test Telegram message
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ vars.TELEGRAM_CHAT_ID }}\", \"text\": \"${{ github.event.inputs.message }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Failed to send Telegram message (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "✅ Test message sent successfully"
