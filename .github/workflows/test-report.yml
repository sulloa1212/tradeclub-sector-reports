name: Test a single report

# Manual, on-demand build of ONE registry report (Phase 2 testing + future
# per-report scheduling). Generates site/<slug>/ and commits it; Cloudflare
# then publishes it at /<slug>/. Does NOT touch the scheduled sector build.

on:
  workflow_dispatch:
    inputs:
      report:
        description: "Report slug (gap-risk, mean-reversion, sector-intelligence, ...)"
        required: true
        default: "gap-risk"

permissions:
  contents: write

concurrency:
  group: build-sector-reports
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build one report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python build.py --report "${{ github.event.inputs.report }}"

      - name: Commit & push the generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/
          git commit -m "Test report: ${{ github.event.inputs.report }} $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
